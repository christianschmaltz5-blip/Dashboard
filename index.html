<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kevin Andreson Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #000;
      --surface-1: rgba(255,255,255,0.025);
      --surface-2: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.18);
      --text: #fff;
      --text-dim: rgba(255,255,255,0.45);
      --text-faint: rgba(255,255,255,0.2);
      --accent: #3B82F6;
      --accent-dim: rgba(59,130,246,0.15);
      --green: #10B981;
      --green-dim: rgba(16,185,129,0.15);
    }

    body {
      font-family: 'Josefin Sans', sans-serif;
      background: var(--black);
      color: var(--text);
      width: 100vw;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── ATMOSPHERIC BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 900px 600px at 50% 45%, rgba(27,58,107,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 400px 400px at 20% 80%, rgba(59,130,246,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: relative;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .nav-brand { display: flex; align-items: center; gap: 14px; }

    .nav-logo {
      width: 30px; height: 30px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04);
    }
    .nav-logo svg { width: 14px; height: 14px; fill: none; stroke: rgba(255,255,255,0.7); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .nav-name {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    .nav-date { font-size: 11px; color: var(--text-faint); letter-spacing: 0.05em; font-weight: 300; }

    .nav-pill {
      font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; padding: 4px 12px; border-radius: 20px;
      background: rgba(59,130,246,0.1);
      color: rgba(96,165,250,0.9);
      border: 1px solid rgba(59,130,246,0.2);
    }

    /* ── SCENE ── */
    #scene {
      height: calc(100vh - 76px);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── ORBIT RINGS ── */
    .orbit-ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .orbit-ring-1 {
      width: 440px; height: 440px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .orbit-ring-2 {
      width: 310px; height: 310px;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .orbit-ring-3 {
      width: 570px; height: 570px;
      border: 1px solid rgba(255,255,255,0.025);
    }

    /* ── CENTER ORB ── */
    .center-orb {
      position: absolute;
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #111;
      border: 1.5px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      box-shadow: 0 0 60px rgba(255,255,255,0.12), 0 0 120px rgba(59,130,246,0.08);
      animation: orbPulse 3s ease-in-out infinite;
    }

    .center-orb::before {
      content: '';
      position: absolute;
      width: 94px; height: 94px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      animation: ping 2.8s ease-out infinite;
    }

    .center-orb::after {
      content: '';
      position: absolute;
      width: 116px; height: 116px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.05);
      animation: ping 2.8s ease-out infinite 0.7s;
    }

    .center-monogram {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      user-select: none;
    }

    @keyframes orbPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(255,255,255,0.1), 0 0 80px rgba(59,130,246,0.06); }
      50%       { box-shadow: 0 0 70px rgba(255,255,255,0.18), 0 0 140px rgba(59,130,246,0.1); }
    }

    @keyframes ping {
      0%   { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.7); opacity: 0; }
    }

    /* ── NODES ── */
    .node {
      position: absolute;
      width: 48px; height: 48px;
      transform: translate(-50%, -50%);
      cursor: pointer;
      transition: opacity 0.8s ease;
    }

    .node-circle {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .node-circle::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      background: transparent;
      transition: all 0.35s ease;
    }

    .node:hover .node-circle,
    .node.active .node-circle {
      background: #fff;
      border-color: #fff;
      box-shadow: 0 0 0 8px rgba(255,255,255,0.06), 0 12px 40px rgba(0,0,0,0.6), 0 0 60px rgba(255,255,255,0.12);
      transform: scale(1.4);
    }

    .node.related .node-circle {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 0 0 6px rgba(255,255,255,0.04), 0 0 24px rgba(255,255,255,0.1);
      transform: scale(1.15);
    }

    .node-circle svg {
      width: 16px; height: 16px;
      stroke: rgba(255,255,255,0.65);
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.25s;
    }

    .node:hover .node-circle svg,
    .node.active .node-circle svg { stroke: #000; }
    .node.related .node-circle svg { stroke: rgba(255,255,255,0.9); }

    .pinned-node {
      position: absolute;
      left: 50%; top: calc(50% + 115px);
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer; text-decoration: none; z-index: 50;
    }
    .pinned-node .node-circle { transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    .pinned-node:hover .node-circle { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.5); transform: scale(1.15); }
    .pinned-node:hover .node-label { color: #fff; letter-spacing: 0.18em; }

    .node-aura {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      top: 50%; left: 50%;
      transition: opacity 0.3s;
    }

    .node-label {
      position: absolute;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .node.active .node-label,
    .node:hover .node-label {
      color: #fff;
      letter-spacing: 0.18em;
    }

    /* ── CARD ── */
    .node-card {
      position: absolute;
      top: 74px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      background: rgba(6,6,6,0.97);
      backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 16px;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.95),
        0 0 0 1px rgba(255,255,255,0.03),
        inset 0 1px 0 rgba(255,255,255,0.06);
      display: none;
      z-index: 500;
      overflow: hidden;
    }

    .node-card::before {
      content: '';
      position: absolute;
      top: -8px; left: 50%;
      transform: translateX(-50%);
      width: 1px; height: 8px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2));
    }

    .card-top-bar {
      height: 2px;
      width: 100%;
    }

    .node.active .node-card { display: block; }

    .card-inner { padding: 16px 18px 18px; }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .card-badge {
      font-size: 8px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 20px;
      display: flex; align-items: center; gap: 5px;
    }

    .badge-live {
      background: rgba(16,185,129,0.12);
      color: #34D399;
      border: 1px solid rgba(52,211,153,0.25);
    }
    .badge-live::before {
      content: '';
      width: 5px; height: 5px; border-radius: 50%;
      background: #34D399;
      box-shadow: 0 0 6px #34D399;
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .badge-building  {
      background: rgba(59,130,246,0.1);
      color: #60A5FA;
      border: 1px solid rgba(96,165,250,0.2);
    }
    .badge-pending {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.09);
    }

    .card-date {
      font-size: 9px;
      color: var(--text-faint);
      letter-spacing: 0.1em;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    .card-title {
      font-size: 14px; font-weight: 700;
      margin-bottom: 7px; color: #fff;
      letter-spacing: 0.03em;
    }

    .card-body {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.7;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    .card-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 14px -18px;
    }

    .energy-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }
    .energy-label-text {
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-faint);
      display: flex; align-items: center; gap: 5px;
    }
    .energy-label-text svg { opacity: 0.5; }
    .energy-pct {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6);
      font-family: 'DM Sans', sans-serif;
    }

    .energy-bar {
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }
    .energy-fill {
      height: 100%;
      background: linear-gradient(90deg, #1B3A6B, #3B82F6, #8B5CF6);
      border-radius: 99px;
    }

    .card-connections { margin-top: 14px; }

    .connections-label {
      font-size: 8px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-faint);
      display: flex; align-items: center; gap: 5px;
      margin-bottom: 8px;
    }

    .connection-chips { display: flex; flex-wrap: wrap; gap: 5px; }

    .chip {
      font-size: 9px; font-weight: 600;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.06em;
    }

    .chip:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-color: rgba(255,255,255,0.25);
    }

    /* Card flips above the node when node is in lower half of orbit */
    .node.card-flip .node-card {
      top: auto;
      bottom: 74px;
    }
    .node.card-flip .node-card::before {
      top: auto;
      bottom: -8px;
      background: linear-gradient(to top, transparent, rgba(255,255,255,0.2));
    }

    .card-open-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }
    .card-open-btn:hover {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    /* ── HINT ── */
    .hint {
      font-size: 10px; color: rgba(255,255,255,0.15);
      letter-spacing: 0.1em; text-align: center;
      padding: 5px 0 0;
      flex-shrink: 0;
      font-weight: 300;
      font-family: 'DM Sans', sans-serif;
      position: relative; z-index: 1;
    }

    .scroll-hint {
      text-align: center;
      padding: 4px 0 10px;
      flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .scroll-hint svg {
      width: 14px; height: 14px;
      stroke: rgba(255,255,255,0.1);
      fill: none; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      animation: bounce 3s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }

    /* ── MARKET SECTION ── */
    .market-section {
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 4rem 2rem 6rem;
      background: #000;
      position: relative; z-index: 1;
    }
    .market-container { max-width: 920px; margin: 0 auto; }

    .m-header {
      display: flex; align-items: flex-end;
      justify-content: space-between; margin-bottom: 3rem;
    }
    .m-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 8px;
    }
    .m-headline {
      font-size: 28px; font-weight: 700;
      color: #fff; letter-spacing: 0.01em;
      line-height: 1;
    }
    .m-subtitle {
      font-size: 11px; color: var(--text-faint);
      margin-top: 7px; font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }
    .m-generated {
      font-size: 10px; color: var(--text-faint);
      letter-spacing: 0.05em; font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    .m-row { margin-bottom: 2.75rem; }
    .m-section-label {
      font-size: 8px; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.18);
      margin-bottom: 16px; display: flex; align-items: center; gap: 12px;
    }
    .m-section-label::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.04);
    }

    .m-rates {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1rem; max-width: 460px; position: relative;
    }
    .m-rate-card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 1.5rem 1.75rem;
      transition: border-color 0.2s;
    }
    .m-rate-card:hover { border-color: rgba(255,255,255,0.12); }
    .m-rate-name {
      font-size: 8px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px;
    }
    .m-rate-value {
      font-size: 36px; font-weight: 300; color: #fff;
      line-height: 1; margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .m-rate-change { font-size: 11px; color: var(--text-dim); font-family: 'DM Sans', sans-serif; }
    .m-rate-source {
      position: absolute; bottom: -22px; right: 0;
      font-size: 9px; color: rgba(255,255,255,0.14); letter-spacing: 0.08em;
      font-family: 'DM Sans', sans-serif;
    }

    .m-metrics {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.75rem;
    }
    .m-metric {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 1.25rem 1.25rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .m-metric:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.12);
    }
    .m-metric-label {
      font-size: 8px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px;
    }
    .m-metric-val {
      font-size: 20px; font-weight: 300; color: #fff;
      margin-bottom: 5px; letter-spacing: -0.01em;
    }
    .m-metric-sub { font-size: 10px; color: var(--text-dim); font-family: 'DM Sans', sans-serif; }

    .m-chart { display: flex; align-items: flex-end; gap: 8px; padding-bottom: 4px; }
    .m-bar-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .m-bar-val { font-size: 9px; color: var(--text-faint); font-family: 'DM Sans', sans-serif; }
    .m-bar { width: 44px; border-radius: 4px 4px 0 0; }
    .m-bar-label { font-size: 9px; color: var(--text-faint); font-family: 'DM Sans', sans-serif; }

    .m-bottom-grid {
      display: grid; grid-template-columns: 1fr 1.3fr;
      gap: 3rem; margin-top: 0.5rem;
    }
    .m-table { width: 100%; border-collapse: collapse; }
    .m-th {
      text-align: left; font-size: 8px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.2); padding: 0 12px 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .m-td {
      padding: 10px 12px 10px 0; font-size: 12px;
      color: var(--text-dim);
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-family: 'DM Sans', sans-serif;
    }
    .m-td-city { font-weight: 500; color: #fff; font-family: 'Josefin Sans', sans-serif; }
    .m-td small { font-size: 10px; display: block; color: var(--text-faint); }

    .m-notice {
      margin-top: 2.5rem;
      background: rgba(251,191,36,0.03);
      border: 1px solid rgba(251,191,36,0.12);
      border-radius: 14px; padding: 1.5rem 1.75rem;
    }
    .m-notice-title {
      font-size: 8px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: rgba(251,191,36,0.6); margin-bottom: 10px;
    }
    .m-notice-body {
      font-size: 12px; color: rgba(255,255,255,0.4);
      line-height: 1.8; font-family: 'DM Sans', sans-serif; font-weight: 300;
    }

    .m-empty {
      text-align: center; padding: 6rem 2rem;
      color: rgba(255,255,255,0.2); font-size: 13px; line-height: 2.4;
      font-family: 'DM Sans', sans-serif; font-weight: 300;
    }
    .m-empty code {
      font-family: monospace; font-size: 11px;
      color: #60A5FA; background: rgba(59,130,246,0.08);
      padding: 3px 10px; border-radius: 5px;
      border: 1px solid rgba(59,130,246,0.15);
    }

    /* ── QUICK LAUNCH ── */
    .quicklaunch-section {
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 1.75rem 2rem 1.25rem;
      background: #000;
    }
    .ql-label {
      font-size: 8px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(255,255,255,0.18);
      text-align: center; margin-bottom: 14px;
      font-family: 'DM Sans', sans-serif;
    }
    .ql-grid {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      max-width: 880px; margin: 0 auto;
    }
    .ql-tile {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .ql-tile:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }
    .ql-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .ql-dot-live     { background: #34D399; box-shadow: 0 0 5px #34D399; }

let autoRotate = true;
let activeId = null;
const nodeEls = {};

function getPos(index, total, angle) {
  const a = ((index / total) * 360 + angle) % 360;
  const r = 210;
  const rad = (a * Math.PI) / 180;
  const x = r * Math.cos(rad);
  const y = r * Math.sin(rad);
  const opacity = Math.max(0.3, Math.min(1, 0.3 + 0.7 * ((1 + Math.sin(rad)) / 2)));
  const zIndex = Math.round(100 + 50 * Math.cos(rad));
  return { x, y, opacity, zIndex };
}

function makeNode(item) {
  const wrapper = document.createElement("div");
  wrapper.className = "node";
  wrapper.dataset.id = item.id;

  const aura = document.createElement("div");
  aura.className = "node-aura";
  const auraSize = item.energy * 0.55 + 40;
  aura.style.cssText = `width:${auraSize}px;height:${auraSize}px;`;

  const circle = document.createElement("div");

  circle.innerHTML = `<svg viewBox="0 0 24 24" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" fill="none">${item.icon}</svg>`;

  const label = document.createElement("div");
  label.className = "node-label";
  label.textContent = item.title;

  const card = document.createElement("div");
  card.className = "node-card";

  const relChips = item.relatedIds.map(rid => {
    const rel = NODES.find(n => n.id === rid);
    return `<span class="chip" data-target="${rid}">${rel?.title}</span>`;
  }).join("");

  const connSection = item.relatedIds.length ? `
    <div class="card-connections">
      <div class="connections-label">

        Linked Nodes
      </div>
      <div class="connection-chips">${relChips}</div>
    </div>` : "";

  card.innerHTML = `
    <div class="card-top-bar" style="background:${TOP_BAR_COLOR[item.status]}"></div>
    <div class="card-inner">
      <div class="card-meta">
        <span class="card-badge badge-${item.status}">${BADGE_LABEL[item.status]}</span>
        <span class="card-date">${item.date}</span>
      </div>
      <div class="card-title">${item.title}</div>
      <div class="card-body">${item.body}</div>
      <div class="card-divider"></div>
      <div class="energy-row">
        <div class="energy-label-text">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Progress
        </div>
        <div class="energy-pct">${item.energy}%</div>
      </div>
      <div class="energy-bar"><div class="energy-fill" style="width:${item.energy}%"></div></div>
      ${connSection}
      <button class="card-open-btn" data-page="${item.page}">Open Agent →</button>
    </div>`;

  wrapper.appendChild(aura);
  wrapper.appendChild(circle);
  wrapper.appendChild(label);
  wrapper.appendChild(card);

  wrapper.addEventListener("click", e => {
    e.stopPropagation();
    if (activeId === item.id) {
      deactivateAll();
    } else {
      toggleNode(item.id);
    }
  });

  card.querySelector(".card-open-btn").addEventListener("click", e => {
    e.stopPropagation();
    window.location.href = item.page;
  });

  card.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", e => {
      e.stopPropagation();
      toggleNode(parseInt(chip.dataset.target));
    });
  });

  scene.appendChild(wrapper);
  nodeEls[item.id] = wrapper;
}

function toggleNode(id) {
  if (activeId === id) { deactivateAll(); return; }
  deactivateAll();
  activeId = id;
  autoRotate = false;
  nodeEls[id].classList.add("active");
  const item = NODES.find(n => n.id === id);
  item.relatedIds.forEach(rid => nodeEls[rid]?.classList.add("related"));
}

function deactivateAll() {
  activeId = null;
  autoRotate = true;
  Object.values(nodeEls).forEach(el => el.classList.remove("active", "related"));
}

scene.addEventListener("click", e => {
  const t = e.target;
  if (t === scene || t.classList.contains("orbit-ring") || t.classList.contains("center-orb") || t.classList.contains("center-monogram")) {
    deactivateAll();
  }
});

  const grid = document.getElementById('ql-grid');
  NODES.forEach(item => {
    const a = document.createElement('a');
    a.className = 'ql-tile';
    a.href = item.page;
    a.innerHTML = `

      <span class="ql-name">${item.title}</span>
      <span class="ql-freq">${item.date}</span>`;
    grid.appendChild(a);
  });
})();

function updatePositions() {
  const total = NODES.length;
  NODES.forEach((item, index) => {
    const el = nodeEls[item.id];
    if (!el) return;
    const pos = getPos(index, total, rotationAngle);
    el.style.left = `calc(50% + ${pos.x}px)`;
    el.style.top  = `calc(50% + ${pos.y}px)`;
    el.style.zIndex = el.classList.contains("active") ? 500 : pos.zIndex;
    el.style.opacity = el.classList.contains("active") ? 1 : pos.opacity;
    // Flip card to open upward when node is in the lower half of the orbit
    if (pos.y > 60) {
      el.classList.add("card-flip");
    } else {
      el.classList.remove("card-flip");
    }
  });
}

let last = 0;
function tick(ts) {
  if (autoRotate && ts - last > 50) {
    rotationAngle = (rotationAngle + 0.25) % 360;
    last = ts;
  }
  updatePositions();
  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);

</script>

(function renderMarket() {
  const section = document.getElementById('market-section');
  const data = window.MARKET_DATA;

  if (!data) {
    section.querySelector('.market-container').innerHTML = `
      <div class="m-empty">
        No live data yet.<br/>
        Run <code>python3 ~/arc-dashboard/agents/mls_report/mls_report.py</code>
        to populate the market dashboard.
      </div>`;
    return;
  }

  const { generated, rates, rapidCity: rc, trend, tiers, cities } = data;

  function fc(v) { return v != null ? '$' + Number(v).toLocaleString() : 'N/A'; }
  function fi(v) { return v != null ? Number(v).toLocaleString() : 'N/A'; }
  function pct(v) {
    if (v == null) return '';
    const col = v >= 0 ? '#34D399' : '#F87171';
    const arrow = v >= 0 ? '▲' : '▼';
    return `<span style="color:${col}">${arrow} ${Math.abs(v).toFixed(1)}%</span>`;
  }
  function rateArrow(v) {
    if (!v) return `<span style="color:rgba(255,255,255,0.25)">— unchanged</span>`;
    const col = v > 0 ? '#F87171' : '#34D399';
    const arrow = v > 0 ? '▲' : '▼';
    return `<span style="color:${col}">${arrow} ${Math.abs(v).toFixed(2)}% WoW</span>`;
  }

  let chartHtml = '';
  if (trend && trend.length >= 2) {
    const vals = trend.map(t => t.value);
    const minV = Math.min(...vals) * 0.993;
    const rng  = Math.max(...vals) - minV || 1;
    chartHtml = trend.map((t, i) => {
      const h   = Math.max(6, Math.round(((t.value - minV) / rng) * 72));
      const col = i === trend.length - 1
        ? 'rgba(59,130,246,0.9)' : 'rgba(59,130,246,0.3)';
      return `<div class="m-bar-col">
        <div class="m-bar-val">$${(t.value/1000).toFixed(0)}K</div>
        <div class="m-bar" style="height:${h}px;background:${col}"></div>
        <div class="m-bar-label">${t.month}</div>
      </div>`;

      <td class="m-td" style="font-weight:500;color:#fff">${fc(t.value)}</td>

    const icChange = c.inventoryChange != null

      <td class="m-td">${fi(c.newListings)}</td>

  const invSub = rc.inventoryChange != null
    ? `<div class="m-metric-sub" style="color:${rc.inventoryChange > 0 ? '#F87171' : '#34D399'}">${rc.inventoryChange > 0 ? '+' : ''}${rc.inventoryChange} MoM</div>`
    : '';

  section.querySelector('.market-container').innerHTML = `
    <div class="m-header">
      <div>
        <div class="m-title">Live Market Intelligence</div>
        <div class="m-headline">Black Hills Market</div>
        <div class="m-subtitle">Rapid City · Spearfish · Hot Springs · Custer · Hermosa · Box Elder · Piedmont &nbsp;·&nbsp; Zillow + FRED</div>
      </div>
      <div class="m-generated">Updated ${generated}</div>
    </div>

    <div class="m-row">
      <div class="m-section-label">Mortgage Rates</div>
      <div class="m-rates">
        <div class="m-rate-card">
          <div class="m-rate-name">30-Year Fixed</div>
          <div class="m-rate-value">${rates.rate30}%</div>
          <div class="m-rate-change">${rateArrow(rates.change30)}</div>
        </div>
        <div class="m-rate-card">
          <div class="m-rate-name">15-Year Fixed</div>
          <div class="m-rate-value">${rates.rate15}%</div>
          <div class="m-rate-change">${rateArrow(rates.change15)}</div>
        </div>
        <div class="m-rate-source">Federal Reserve FRED</div>
      </div>
    </div>

    <div class="m-row" style="margin-top:3rem">
      <div class="m-section-label">Rapid City &nbsp;&middot;&nbsp; Full Snapshot</div>
      <div class="m-metrics">
        <div class="m-metric">
          <div class="m-metric-label">Home Value</div>
          <div class="m-metric-val">${fc(rc.zhvi)}</div>
          <div class="m-metric-sub">${pct(rc.zhviChange)} MoM</div>

        <div class="m-metric">
          <div class="m-metric-label">Median Sale</div>
          <div class="m-metric-val">${fc(rc.salePrice)}</div>
          <div class="m-metric-sub">${pct(rc.salePriceChange)} MoM</div>
        </div>
        <div class="m-metric">
          <div class="m-metric-label">Inventory</div>
          <div class="m-metric-val">${fi(rc.inventory)}</div>
          ${invSub}
        </div>

          <div class="m-metric-label">New Listings</div>
          <div class="m-metric-val">${fi(rc.newListings)}</div>
        </div>
        <div class="m-metric">
          <div class="m-metric-label">Sold Above Ask</div>
          <div class="m-metric-val">${rc.pctAbove != null ? rc.pctAbove + '%' : 'N/A'}</div>
          <div class="m-metric-sub">of homes</div>
        </div>

    ${chartHtml ? `
    <div class="m-row">

      <div class="m-chart">${chartHtml}</div>
    </div>` : ''}

    <div class="m-bottom-grid">
      ${tierRows ? `
      <div>
        <div class="m-section-label">By Bedroom Count</div>
        <table class="m-table">
          <thead><tr>
            <th class="m-th">Size</th>
            <th class="m-th">Typical Value</th>
            <th class="m-th">MoM</th>
          </tr></thead>
          <tbody>${tierRows}</tbody>
        </table>
      </div>` : '<div></div>'}
      <div>
        <div class="m-section-label">Regional Breakdown</div>
        <table class="m-table">
          <thead><tr>
            <th class="m-th">City</th>
            <th class="m-th">ZHVI</th>
            <th class="m-th">Inventory</th>
            <th class="m-th">New</th>
          </tr></thead>
          <tbody>${cityRows}</tbody>
        </table>
      </div>
    </div>`;
})();
</script>
<script src="js/search.js"></script>
</body>
</html>
